<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ВЕБЭКС</title>
    <script>
        // Перенаправление на index.html с сохранением маршрута
        (function() {
            const path = window.location.pathname;
            const repoName = 'webex';

            // Получаем путь после имени репозитория
            const pathAfterRepo = path.split(`/${repoName}/`)[1];

            if (pathAfterRepo && pathAfterRepo !== 'index.html') {
                // Сохраняем путь для восстановления после загрузки
                localStorage.setItem('redirectPath', pathAfterRepo);
            }

            // Перенаправляем на корень репозитория
            window.location.replace(`/${repoName}/`);
        })();
    </script>
</head>
<body>
<p>Перенаправление...</p>
</body>
</html>
